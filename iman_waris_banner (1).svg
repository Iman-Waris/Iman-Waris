<svg
  width="854"
  height="230"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 854 230"
>
  <style>
    .name {
      font-size: 54px;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
      animation: fadeUp 1.1s ease-out forwards;
      opacity: 0;
    }
    .desc {
      font-size: 15px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
      letter-spacing: 0.8px;
      animation: fadeUp 1.5s ease-out forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <defs>
    <!-- Royal blue dark gradient left to right -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1b6e"/>
      <stop offset="35%"  stop-color="#1a2f8f"/>
      <stop offset="65%"  stop-color="#1e3a9e"/>
      <stop offset="100%" stop-color="#2546b0"/>
    </linearGradient>

    <!-- Wave cut gradient — slightly lighter royal blue -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a2f8f"/>
      <stop offset="50%"  stop-color="#2550c0"/>
      <stop offset="100%" stop-color="#1a2f8f"/>
    </linearGradient>
  </defs>

  <!-- Full background -->
  <rect width="854" height="230" fill="url(#bg)"/>

  <!-- Bottom wave cut — animated like Rehman bhai -->
  <path fill="url(#waveGrad)" opacity="0.5">
    <animate
      attributeName="d"
      dur="14s"
      repeatCount="indefinite"
      keyTimes="0;0.333;0.667;1"
      values="M0 180Q 213 230 427 200T 854 215L 854 230 L0 230 Z;
              M0 195Q 213 230 427 210T 854 200L 854 230 L0 230 Z;
              M0 185Q 213 210 427 220T 854 205L 854 230 L0 230 Z;
              M0 180Q 213 230 427 200T 854 215L 854 230 L0 230 Z"/>
  </path>
  <path fill="url(#waveGrad)" opacity="0.3">
    <animate
      attributeName="d"
      dur="14s"
      repeatCount="indefinite"
      keyTimes="0;0.333;0.667;1"
      begin="-7s"
      values="M0 190Q 213 220 427 210T 854 205L 854 230 L0 230 Z;
              M0 200Q 213 215 427 195T 854 220L 854 230 L0 230 Z;
              M0 195Q 213 225 427 205T 854 210L 854 230 L0 230 Z;
              M0 190Q 213 220 427 210T 854 205L 854 230 L0 230 Z"/>
  </path>

  <!-- Name -->
  <text
    class="name"
    text-anchor="middle"
    dominant-baseline="middle"
    x="50%" y="38%"
    fill="#ffffff"
  >Iman Waris</text>

  <!-- Desc -->
  <text
    class="desc"
    text-anchor="middle"
    dominant-baseline="middle"
    x="50%" y="62%"
    fill="#a8c8ff"
  >Full Stack Developer  |  .NET Developer  |  WordPress &amp; WooCommerce Expert</text>

</svg>
